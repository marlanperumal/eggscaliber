services:
  postgres:
    image: postgres:16
    container_name: eggscaliber-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eggscaliber}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eggscaliber}
      POSTGRES_DB: ${POSTGRES_DB:-eggscaliber}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: eggscaliber-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-eggscaliber}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-eggscaliber}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
