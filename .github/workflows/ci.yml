name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Run JS checks
        run: pnpm check

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Sync API dependencies
        run: uv sync --project apps/api

      - name: Run Python lint
        run: uv run --project apps/api ruff check apps/api

      - name: Run Python smoke checks
        run: |
          PYTHONPATH=. uv run --project apps/api pytest
          uv run --project apps/api python -m compileall apps/api
